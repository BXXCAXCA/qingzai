name: qingzai
description: Qing Zai cross-platform productivity application.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  webdav_client: ^1.2.0
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  dio: ^5.3.3
  http: ^1.1.0
  multicast_dns: ^0.3.2
  network_info_plus: ^4.1.0
  device_info_plus: ^9.1.0
  path_provider: ^2.1.1
  path: ^1.8.3
  uuid: ^4.1.0
  json_annotation: ^4.8.1
  flutter_local_notifications: ^16.1.0
  connectivity_plus: ^5.0.2
  flutter_secure_storage: ^9.0.0
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.1
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  mockito: ^5.4.2
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
