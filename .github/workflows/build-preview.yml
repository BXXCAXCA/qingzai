name: Build Preview Artifacts

on:
  workflow_dispatch:

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Android platform project
        run: flutter create . --platforms=android --project-name qingzai --org com.qingzai

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qingzai-android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  linux:
    name: Linux preview bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Linux platform project
        run: flutter create . --platforms=linux --project-name qingzai --org com.qingzai

      - name: Build Linux release bundle
        run: flutter build linux --release

      - name: Archive Linux bundle
        run: tar -czf qingzai-linux-preview.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux preview bundle
        uses: actions/upload-artifact@v4
        with:
          name: qingzai-linux-preview
          path: qingzai-linux-preview.tar.gz

  windows:
    name: Windows preview bundle
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Windows platform project
        run: flutter create . --platforms=windows --project-name qingzai --org com.qingzai

      - name: Build Windows release bundle
        run: flutter build windows --release

      - name: Archive Windows bundle
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath qingzai-windows-preview.zip -Force

      - name: Upload Windows preview bundle
        uses: actions/upload-artifact@v4
        with:
          name: qingzai-windows-preview
          path: qingzai-windows-preview.zip
